# Render 部署配置文件
# 文档: https://render.com/docs/yaml

# 服务类型：Web Service
type: web

# Git 仓库信息（部署时填写）
# repo: your-github-repo-url

# 运行时环境
runtime: python

# Python 版本
pythonVersion: "3.11"

# 构建命令
buildCommand: "./build.sh"

# 启动命令 - 使用 gunicorn 运行 Flask 应用
startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

# 自动部署配置
autoDeploy: true

# 生产环境分支
# branch: main

# 服务计划（免费版）
plan: free

# 健康检查
healthCheckPath: /health

# 环境变量
envVars:
  # 应用密钥（生产环境必须修改）
  - key: SECRET_KEY
    generateValue: true
    description: "Flask 会话加密密钥，自动生成随机值"

  # 数据库路径（Render 免费版使用 /tmp）
  - key: DATABASE_PATH
    value: "/tmp/hnau_market.db"
    description: "SQLite 数据库文件路径"

  # Flask 环境
  - key: FLASK_ENV
    value: "production"
    description: "Flask 运行环境"

  # Python 版本（与上面的 pythonVersion 对应）
  - key: PYTHON_VERSION
    value: "3.11.0"
