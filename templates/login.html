{% extends "base.html" %}
{% block title %}登录 - 河农大闲置交易平台{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 60px auto;">
    <h2 style="text-align: center; margin-bottom: 24px; color: #2E7D32;">🌾 用户登录</h2>
    
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    {% if request.args.get('success') %}
        <div class="alert alert-success">{{ request.args.get('success') }}</div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required placeholder="请输入用户名" autofocus>
        </div>
        
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required placeholder="请输入密码">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 12px; font-size: 16px;">登录</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; color: #666;">
        还没有账号？<a href="{{ url_for('register') }}" style="color: #2E7D32;">立即注册</a>
    </div>
    
    <div style="margin-top: 24px; padding: 16px; background: #E8F5E9; border-radius: 8px;">
        <p style="font-size: 12px; color: #666; margin-bottom: 8px;">💡 管理员账号：</p>
        <p style="font-size: 12px; color: #333;">用户名：admin</p>
        <p style="font-size: 12px; color: #333;">密码：admin123</p>
    </div>
</div>
{% endblock %}
