{% extends "base.html" %}
{% block title %}注册 - 河农大闲置交易平台{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center; margin-bottom: 24px; color: #2E7D32;">🌾 用户注册</h2>
    
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label>用户名 *</label>
            <input type="text" name="username" required placeholder="至少3个字符" autofocus>
        </div>
        
        <div class="form-group">
            <label>密码 *</label>
            <input type="password" name="password" required placeholder="至少6个字符">
        </div>
        
        <div class="form-group">
            <label>确认密码 *</label>
            <input type="password" name="confirm_password" required placeholder="再次输入密码">
        </div>
        
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" name="phone" placeholder="可选">
        </div>
        
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="可选">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 12px; font-size: 16px;">注册</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; color: #666;">
        已有账号？<a href="{{ url_for('login') }}" style="color: #2E7D32;">立即登录</a>
    </div>
</div>
{% endblock %}
