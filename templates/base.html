<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}河农大闲置交易平台{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #E8F5E9 0%, #F1F8E9 100%);
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, #2E7D32 0%, #388E3C 100%);
            color: white;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            color: white;
        }
        .navbar .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .navbar .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 主内容区 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #2E7D32;
            color: white;
        }
        .btn-primary:hover { background: #43A047; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #73d13d; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-danger:hover { background: #ff7875; }
        .btn-warning {
            background: #F9A825;
            color: white;
        }
        .btn-warning:hover { background: #FBC02D; }
        .btn-secondary { background: #e0e0e0; color: #666; }
        .btn-secondary:hover { background: #d0d0d0; }
        
        /* 成色标签样式 */
        .condition-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .condition-全新 { background: #E8F5E9; color: #2E7D32; border: 1px solid #2E7D32; }
        .condition-99新 { background: #F3F8E1; color: #7CB342; border: 1px solid #7CB342; }
        .condition-95新 { background: #FFF8E1; color: #F9A825; border: 1px solid #F9A825; }
        .condition-9成新 { background: #FFF3E0; color: #E65100; border: 1px solid #FF9800; }
        .condition-8成新 { background: #FCE4EC; color: #C2185B; border: 1px solid #E91E63; }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2E7D32;
            box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.2);
        }
        
        /* 错误/成功提示 */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .alert-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        .alert-success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        
        /* 物品网格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .item-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.15);
        }
        .item-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .item-card .info {
            padding: 16px;
        }
        .item-card .title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .item-card .price {
            font-size: 22px;
            color: #F9A825;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .item-card .meta {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .item-card .meta .condition {
            margin-left: auto;
        }
        .item-card .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .item-card .favorite-btn:hover {
            transform: scale(1.1);
        }
        .item-card .favorite-btn.active {
            background: #ff4d4f;
            color: white;
        }
        .item-card-wrapper {
            position: relative;
        }
        .favorite-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #999;
        }
        
        /* 认证状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-未认证 { background: #fff0f0; color: #ff4d4f; }
        .status-待审核 { background: #fffbe6; color: #faad14; }
        .status-已认证 { background: #E8F5E9; color: #2E7D32; }
        
        /* 分类图标导航 */
        .category-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            min-width: 90px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .category-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(46, 125, 50, 0.15);
        }
        .category-item.active {
            background: #2E7D32;
            color: white;
        }
        .category-item .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .category-item .name {
            font-size: 13px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 12px;
            }
            .navbar .nav-links {
                margin-top: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .category-nav {
                gap: 8px;
            }
            .category-item {
                padding: 10px 14px;
                min-width: 70px;
            }
            .category-item .icon {
                font-size: 24px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="logo">🌾 河农大闲置交易</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">首页</a>
            {% if session.user_id %}
                <a href="{{ url_for('publish') }}">发布闲置</a>
                <a href="{{ url_for('profile') }}">个人中心</a>
                <a href="{{ url_for('my_favorites') }}">我的收藏</a>
                <a href="{{ url_for('logout') }}">退出</a>
            {% else %}
                <a href="{{ url_for('login') }}">登录</a>
                <a href="{{ url_for('register') }}">注册</a>
            {% endif %}
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
