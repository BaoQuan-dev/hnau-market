{% extends "base.html" %}
{% block title %}发布闲置 - 河农大闲置交易平台{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto;">
    <h2 style="text-align: center; margin-bottom: 24px; color: #2E7D32;">📦 发布闲置物品</h2>
    
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('publish') }}">
        <div class="form-group">
            <label>物品名称 *</label>
            <input type="text" name="title" required placeholder="如：九成新 MacBook Pro 2023" autofocus>
        </div>
        
        <div class="form-group">
            <label>分类</label>
            <select name="category">
                <option value="数码">📱 数码</option>
                <option value="书籍">📚 书籍</option>
                <option value="服饰">👗 服饰</option>
                <option value="生活用品">🏠 生活用品</option>
                <option value="运动户外">⚽ 运动户外</option>
                <option value="其他">📦 其他</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>成色</label>
            <select name="condition">
                <option value="全新">✨ 全新 - 全新未使用</option>
                <option value="99新">💚 99新 - 几乎无使用痕迹</option>
                <option value="95新" selected>💛 95新 - 轻微使用痕迹</option>
                <option value="9成新">🧡 9成新 - 正常使用痕迹</option>
                <option value="8成新">❤️ 8成新 - 较多使用痕迹</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>价格（元）</label>
            <input type="number" name="price" step="0.01" min="0" placeholder="0">
        </div>
        
        <div class="form-group">
            <label>物品图片链接</label>
            <input type="url" name="image_url" placeholder="图片上传至图床后的链接">
            <p style="font-size: 12px; color: #999; margin-top: 8px;">
                💡 推荐图床：
                <a href="https://sm.ms" target="_blank" style="color: #2E7D32;">sm.ms</a>、
                <a href="https://imgur.com" target="_blank" style="color: #2E7D32;">Imgur</a>
            </p>
        </div>
        
        <div class="form-group">
            <label>联系方式</label>
            <input type="text" name="contact" placeholder="手机号/微信/QQ">
        </div>
        
        <div class="form-group">
            <label>物品描述</label>
            <textarea name="description" rows="4" placeholder="详细描述物品状态、使用情况、转手原因等..."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">发布闲置</button>
    </form>
</div>
{% endblock %}
